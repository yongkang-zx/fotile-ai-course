<!DOCTYPE html>
<html lang="zh-CN">

<meta charset="UTF-8">

<title>方太·职前 AI 课程 — 对话框</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161822;
    --bg3: #1c1f2e;
    --border: #2a2d3a;
    --text: #c9cdd6;
    --text2: #8b8fa3;
    --accent: #5b8def;
    --accent2: #3dd68c;
    --accent3: #ffa940;
    --red: #e5484d;
    --radius: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* Layout */
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: 220px; min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0;
  }
  .panel {
    width: 380px; min-width: 380px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
  }

  /* Sidebar */
  .sb-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sb-logo {
    font-size: 15px; font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .sb-subtitle {
    font-size: 11px; color: var(--text2);
    margin-top: 2px;
  }
  .sb-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(91,141,239,0.15);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }
  .sb-nav { flex: 1; padding: 8px 0; }
  .sb-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all .15s;
    border-left: 2px solid transparent;
  }
  .sb-nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
  .sb-nav-item.active {
    color: var(--accent);
    background: rgba(91,141,239,0.08);
    border-left-color: var(--accent);
  }
  .sb-nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sb-nav-badge {
    margin-left: auto;
    font-size: 10px;
    background: var(--accent3);
    color: #000;
    padding: 1px 7px;
    border-radius: 9px;
    font-weight: 600;
  }
  .sb-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
  }

  /* Main Header */
  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .main-title { font-size: 17px; font-weight: 600; }
  .main-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    font-family: var(--font);
  }
  .btn:hover { background: rgba(255,255,255,0.05); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn-primary:hover { background: #4a7de0; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(229,72,77,0.1); }

  /* Content area */
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Notif Preview */
  .notif-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .notif-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .notif-title {
    font-size: 16px; font-weight: 700;
    margin-bottom: 12px;
    color: #fff;
  }
  .notif-body {
    font-size: 13.5px; line-height: 1.75;
    color: var(--text);
  }
  .notif-body p { margin-bottom: 10px; }
  .notif-body strong { color: #fff; }
  .notif-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }
  .notif-quote {
    border-left: 2px solid var(--accent3);
    padding-left: 12px;
    color: var(--text2);
    font-style: italic;
    margin: 10px 0;
  }

  /* Form builder */
  .form-section { margin-bottom: 24px; }
  .form-section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .form-section-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center;
    justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .form-section-title { font-size: 15px; font-weight: 600; }
  .form-section-sub { font-size: 11px; color: var(--text2); margin-left: 8px; }

  .question-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex; align-items: flex-start;
    gap: 12px;
  }
  .q-num {
    font-size: 12px; font-weight: 700;
    color: var(--accent);
    min-width: 22px; padding-top: 1px;
  }
  .q-body { flex: 1; }
  .q-title { font-size: 13px; margin-bottom: 6px; }
  .q-type {
    font-size: 10px;
    color: var(--text2);
    background: rgba(255,255,255,0.04);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
  }
  .q-opts {
    font-size: 11px; color: var(--text2);
    margin-top: 4px;
    line-height: 1.8;
  }
  .q-purpose {
    font-size: 11px; color: var(--accent3);
    margin-top: 6px;
    font-style: italic;
  }

  /* Panel: detail view */
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 600;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-body::-webkit-scrollbar { width: 5px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* Course Design Board */
  .phase-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .phase-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .phase-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .phase-name { font-size: 14px; font-weight: 600; }
  .phase-timeline { font-size: 11px; color: var(--text2); margin-left: auto; }
  .module-list { list-style: none; }
  .module-list li {
    font-size: 12px; color: var(--text2);
    padding: 5px 0;
    padding-left: 20px;
    position: relative;
  }
  .module-list li::before {
    content: '';
    position: absolute; left: 6px; top: 11px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border);
  }

  /* Table */
  .tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .tbl th {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tbl td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .tbl tr:hover td { background: rgba(255,255,255,0.02); }

  .chip {
    display: inline-block;
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 10px;
    background: rgba(61,214,140,0.12);
    color: var(--accent2);
    margin: 2px;
  }

  /* Editable textarea */
  .editable {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.7;
    padding: 12px;
    resize: vertical;
    outline: none;
  }
  .editable:focus { border-color: var(--accent); }

  /* Status indicator */
  .status-bar {
    display: flex; gap: 24px;
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text2);
  }
  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent2); color: #000;
    padding: 8px 20px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
    opacity: 0; transition: opacity .3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>

function switchTab(tab) {

  else if (currentTab === 'questionnaire') {
    t.textContent = '📋 需求问卷设计';
    let html = '';
    data.questionnaire.parts.forEach((part, i) => {
      html += `<div class="form-section">
        <div class="form-section-header">
          <span class="form-section-num">${i+1}</span>
          <span class="form-section-title">${part.title}</span>
          <span class="form-section-sub">${part.sub}</span>
        </div>`;
      part.questions.forEach(q => {
        html += `<div class="question-card">
          <span class="q-num">${q.num}</span>
          <div class="q-body">
            <div class="q-title">${q.title} <span class="q-type">${q.type}</span></div>

  else if (currentTab === 'course') {
    t.textContent = '🎓 课程设计框架';
    let html = '<div class="notif-label" style="margin-bottom:12px">核心原则</div>';

      html += `<div class="question-card"><span class="q-num">${i+1}</span><div class="q-body"><div class="q-title">${p}</div></div></div>`;

    html += '<div class="notif-label" style="margin:20px 0 12px">课程阶段</div>';
    data.course.phases.forEach(phase => {
      html += `<div class="phase-card">
        <div class="phase-header">
          <span class="phase-dot" style="background:${phase.color}"></span>
          <span class="phase-name">${phase.name}</span>
          <span class="phase-timeline">${phase.timeline}</span>

        <ul class="module-list">
          ${phase.modules.map(m => `<li>${m}</li>`).join('')}

      </div>`;
    });
    m.innerHTML = html;
  }

  else if (currentTab === 'partner') {
    t.textContent = '🤝 共创伙伴招募';
    let html = `<div style="display:flex;gap:16px;margin-bottom:20px">
      <div class="notif-card" style="flex:1;margin-bottom:0">

      </div>
      <div class="notif-card" style="flex:1;margin-bottom:0">
        <div class="notif-label">报名截止</div>

      </div>
    </div>
    <div class="notif-label" style="margin-bottom:10px">共创角色</div>`;

    data.partner.roles.forEach(r => {
      const cMap = { '低': 'var(--accent2)', '中': 'var(--accent3)', '高': 'var(--accent)' };
      html += `<div class="question-card">
        <span class="q-num" style="color:${cMap[r.commitment]}">●</span>
        <div class="q-body">
          <div class="q-title">${r.role} <span class="chip">投入: ${r.commitment}</span></div>
          <div class="q-opts">${r.desc}</div>

      </div>`;
    });

    html += `<div class="notif-card" style="margin-top:16px">
      <div class="notif-label">招募方式</div>
      <div class="notif-body">${data.partner.recruitment}</div>
    </div>`;
    m.innerHTML = html;
  }

  else if (currentTab === 'settings') {
    t.textContent = '⚙ 配置 & 待确认事项';
    let html = '<div class="notif-label" style="margin-bottom:10px">待确认事项</div>';
    html += '<table class="tbl"><thead><tr><th>事项</th><th>选项</th><th>建议</th></tr></thead><tbody>';
    data.questionnaire.decisions.forEach(d => {
      const opts = d.options.split(' / ').map(o => `<span class="chip" style="margin:1px">${o}</span>`).join(' ');
      html += `<tr><td style="font-weight:600">${d.item}</td><td>${opts}</td><td style="color:var(--accent2)">→ ${d.suggest}</td></tr>`;
    });
    html += '</tbody></table>';

    html += `<div class="notif-label" style="margin:24px 0 10px">数据导出</div>`;
    html += `<div class="notif-card" style="margin-bottom:0">
      <p style="font-size:12px;color:var(--text2);margin-bottom:8px">将当前全部设计数据导出为 JSON，用于后续程序化处理和平台对接。</p>
      <button class="btn btn-primary" onclick="exportJSON()">导出 JSON</button>
    </div>`;
    m.innerHTML = html;
  }
}

function copyActive() {
  let text;
  if (currentTab === 'notif') {
    const ta = $('editableNotif');
    text = ta ? ta.value : data.notif.editableVersion;
  } else {
    text = JSON.stringify(data[currentTab], null, 2);
  }
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板 ✓'));
}

function exportAll() {
  const exportData = {
    exported_at: new Date().toISOString(),
    project: '方太·职前 AI 课程',
    ...data
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'fotile-ai-course-design.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 fotile-ai-course-design.json ✓');
}

function exportJSON() {
  exportAll();
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
document.querySelectorAll('.sb-nav-item').forEach(el => {
  el.addEventListener('click', () => switchTab(el.dataset.tab));
});

renderMain();
